name: daily_tracker
description: A minimal offline-first Flutter app for personal daily tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

# Icon setup steps:
# 1) python tool/generate_icon.py
# 2) flutter pub get
# 3) flutter pub run flutter_launcher_icons
# 4) flutter clean && flutter run
